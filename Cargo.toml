[package]
name = "prinstall"
version = "0.2.0"
edition = "2024"
description = "Discover network printers, match drivers, and install them on Windows"
license = "MIT"
readme = "README.md"

[dependencies]
ratatui = "0.30"
crossterm = "0.29"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", features = ["json"] }
csnmp = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"
clap = { version = "4", features = ["derive"] }
fuzzy-matcher = "0.3"
color-eyre = "0.6"
chrono = { version = "0.4", features = ["serde"] }
zip = "2"
tui-input = "0.15"
throbber-widgets-tui = "0.11"

[build-dependencies]
embed-manifest = "1"
