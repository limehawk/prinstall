# Curated model → driver name mappings
# These are exact matches — when SNMP returns a model string that matches
# a key here, the corresponding driver name is the confirmed correct driver.
#
# Add entries as installs are confirmed to work. See
# docs/contributing-drivers.md for the schema walkthrough.
#
# Contributions welcome — if prinstall picked the wrong driver for a printer
# you just installed, adding an entry here fixes it for every future user
# with that model.

[[matches]]
model = "HP LaserJet Pro MFP M428fdw"
driver = "HP LaserJet Pro MFP M428f PCL-6 (V4)"
source = "manufacturer"

[[matches]]
model = "HP LaserJet Pro MFP M428fdn"
driver = "HP LaserJet Pro MFP M428f PCL-6 (V4)"
source = "manufacturer"

[[matches]]
model = "HP Color LaserJet Pro MFP M479fdw"
driver = "HP Color LaserJet Pro MFP M479 PCL-6 (V4)"
source = "manufacturer"

# Xerox — Global Print Driver PCL6 (universal across VersaLink/AltaLink/Phaser/WorkCentre)
# Driver-name column here matches the `drivers.toml` entry; the real
# Windows-driver-store name may differ slightly and will need reconciling
# after a test install against one real unit per model family.

[[matches]]
model = "Xerox VersaLink C7030"
driver = "Xerox Global Print Driver PCL6"
source = "manufacturer"

[[matches]]
model = "Xerox VersaLink B405"
driver = "Xerox Global Print Driver PCL6"
source = "manufacturer"

[[matches]]
model = "Xerox WorkCentre 6515"
driver = "Xerox Global Print Driver PCL6"
source = "manufacturer"

[[matches]]
model = "Xerox AltaLink C8045"
driver = "Xerox Global Print Driver PCL6"
source = "manufacturer"

[[matches]]
model = "Xerox Phaser 6510"
driver = "Xerox Global Print Driver PCL6"
source = "manufacturer"

