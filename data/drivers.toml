# Manufacturer driver registry
# Maps manufacturers to their universal driver packages and download URLs.
# V1 supports ZIP and CAB formats only.
#
# Contributions welcome — if you know of a stable direct-download URL for a
# vendor not listed here, see docs/contributing-drivers.md for the schema
# and submission guide. URLs must 200 OK on a HEAD request without cookies
# or form submission.
#
# Vendors with verified direct-download URLs:
#   - HP    (PCL6 + PS, version-in-filename URLs — need to bump on UPD updates.
#            HP tracks PCL and PS as independent version streams.)
#   - Xerox (PCL6 + PS, version-in-path URLs — need to bump on GPD updates)
#   - Kyocera KX Driver (evergreen URL via AEM dispatcher alias)
#
# Vendors currently lacking a direct URL (fall through to Catalog/SDI tiers):
#   - Brother (no universal driver; per-model only)
#   - Canon   (Generic Plus UFR II requires session-cookie flow)
#   - Epson   (region-gated driver selector)
#   - Lexmark (Universal v2 XL ships as a .exe InstallShield wrapper —
#              downloader currently handles only .zip/.cab. Follow-up PR
#              will add .exe extraction support and land this URL:
#              https://downloads.lexmark.com/downloads/drivers/
#                Lexmark_Universal_v2_UD1_PCL_XL_Emul_05202024.exe)
#   - Ricoh   (PCL Universal requires form submission)

