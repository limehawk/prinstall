name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build (default — includes SDI)
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          Copy-Item target/x86_64-pc-windows-msvc/release/prinstall.exe prinstall.exe

      - name: Build (lean — no SDI)
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --no-default-features
          Copy-Item target/x86_64-pc-windows-msvc/release/prinstall.exe prinstall-nosdi.exe

      - name: Run tests
        run: cargo test --release --target x86_64-pc-windows-msvc

      - name: Package
        run: 7z a prinstall-windows-amd64.zip prinstall.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: prinstall-windows-amd64
          path: |
            prinstall-windows-amd64.zip
            prinstall.exe
            prinstall-nosdi.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            prinstall-windows-amd64.zip
            prinstall.exe
            prinstall-nosdi.exe
          generate_release_notes: true
