<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Glyph variant: same printer design as the tile (dark slate body,
       paper slit, white output tray, green status LED), scaled to fill
       the canvas with no orange background. Used at 16/32 in the ICO
       where the tile's padding eats too many pixels to leave anything
       legible for the printer itself. -->

  <!-- Printer body -->
  <rect x="16" y="82" width="480" height="264" rx="30" ry="30" fill="#1e293b"/>
  <!-- Top paper slit -->
  <rect x="64" y="118" width="384" height="24" rx="6" ry="6" fill="#475569"/>
  <!-- Output tray sticking out underneath -->
  <rect x="64" y="346" width="384" height="84" rx="12" ry="12" fill="#f8fafc"/>
  <rect x="64" y="346" width="384" height="18" fill="#cbd5e1"/>
  <!-- Status LED -->
  <circle cx="424" cy="190" r="15" fill="#22c55e"/>
</svg>
