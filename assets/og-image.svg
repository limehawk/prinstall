<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#111821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff8355"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#1e2a3a" stroke-width="2"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Printer icon (simplified from prinstall-icon-glyph.svg style) -->
  <!-- Body -->
  <rect x="80" y="220" width="160" height="100" rx="12" fill="#1e293b" stroke="#2a3a50" stroke-width="2"/>
  <!-- Paper tray -->
  <rect x="100" y="320" width="120" height="40" rx="6" fill="#f8fafc"/>
  <rect x="100" y="320" width="120" height="8" rx="2" fill="#cbd5e1"/>
  <!-- Paper input -->
  <rect x="105" y="195" width="110" height="30" rx="4" fill="#334155"/>
  <!-- Status light -->
  <circle cx="215" cy="258" r="8" fill="#50fa7b"/>

  <!-- Title -->
  <text x="310" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#e6edf3" letter-spacing="-1">prinstall</text>

  <!-- Tagline -->
  <text x="310" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#8b99a8">Discover. Match. Add. Remove.</text>

  <!-- Description -->
  <text x="310" y="395" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#5a6878">Network printer management for Windows.</text>
  <text x="310" y="425" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#5a6878">One binary. The right driver. Installed.</text>

  <!-- URL -->
  <text x="310" y="510" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" fill="#ff6b35">prinstall.limehawk.io</text>

  <!-- Tech badges -->
  <rect x="310" y="535" width="65" height="26" rx="4" fill="rgba(255,107,53,0.12)"/>
  <text x="342" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#ff8355" text-anchor="middle">Rust</text>

  <rect x="385" y="535" width="55" height="26" rx="4" fill="rgba(255,107,53,0.12)"/>
  <text x="412" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#ff8355" text-anchor="middle">CLI</text>

  <rect x="450" y="535" width="55" height="26" rx="4" fill="rgba(255,107,53,0.12)"/>
  <text x="477" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#ff8355" text-anchor="middle">MIT</text>

  <rect x="515" y="535" width="80" height="26" rx="4" fill="rgba(255,107,53,0.12)"/>
  <text x="555" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#ff8355" text-anchor="middle">~9 MB</text>
</svg>
